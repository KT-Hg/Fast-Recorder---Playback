<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Crop &amp; Edit Screenshot</title>
  <link rel="stylesheet" href="css/editor.css" />
</head>
<body>

  <!-- Sidebar: Tools -->
  <div class="sidebar">
    <button id="toolCrop"    class="s-btn active" data-tip="Crop (C)">✂</button>
    <button id="toolDraw"    class="s-btn" data-tip="Draw (D)">✏</button>
    <button id="toolRect"    class="s-btn" data-tip="Rectangle (R)">▭</button>
    <button id="toolEllipse" class="s-btn" data-tip="Ellipse (E)">○</button>
    <button id="toolArrow"   class="s-btn" data-tip="Arrow (A)">➜</button>
    <button id="toolText"    class="s-btn" data-tip="Text (T)">T</button>
    <button id="toolBlur"    class="s-btn" data-tip="Blur (B)">⬡</button>
    <div class="s-sep"></div>
    <button id="btnRotL"  class="s-btn" data-tip="Rotate 90° Left">↺</button>
    <button id="btnRotR"  class="s-btn" data-tip="Rotate 90° Right">↻</button>
    <button id="btnFlipH" class="s-btn" data-tip="Flip Horizontal">↔</button>
    <button id="btnFlipV" class="s-btn" data-tip="Flip Vertical">↕</button>
    <div class="s-sep"></div>
    <button id="btnUndo" class="s-btn" disabled data-tip="Undo (Ctrl+Z)">↩</button>
    <button id="btnRedo" class="s-btn" disabled data-tip="Redo (Ctrl+Y)">↪</button>
    <div class="s-sep"></div>
    <button id="btnAdjust" class="s-btn" data-tip="Adjust (Brightness / Contrast)">◑</button>
    <button id="btnResize" class="s-btn" data-tip="Resize image">⤡</button>
    <button id="btnStamp"  class="s-btn" data-tip="Stamp / Watermark">🏷</button>
    <div style="flex:1"></div>
    <button id="btnTheme" class="s-btn" data-tip="Toggle Theme">🌙</button>
    <button id="btnHelp" class="s-btn" data-tip="Shortcuts (?)">?</button>
  </div>

  <!-- Main area -->
  <div class="main-area">
    <!-- Top toolbar: actions only -->
    <div class="toolbar">
      <span class="toolbar-title">✂ Crop &amp; Edit</span>
      <div class="sep"></div>
      <span id="selInfo">Choose a tool</span>
      <div style="flex:1;min-width:8px"></div>
      <button id="btnSaveCrop" class="tbtn" disabled title="Crop &amp; Save">✂ Crop &amp; Save</button>
      <button id="btnSaveFull" class="tbtn" title="Save full image">⬇ Save Full</button>
      <button id="btnCancel"   class="tbtn" title="Cancel">✕ Cancel</button>
    </div>

    <!-- Context bar: shows options for current tool -->
    <div class="context-bar" id="contextBar">
      <span class="ctx-hint" id="ctxHint">Drag to select a crop area</span>
    </div>

    <div id="viewport">
      <div id="wrapper">
        <img id="imgEl" alt="" style="display:none" />
        <canvas id="cvs"></canvas>
        <input id="textInput" type="text" placeholder="Type… Enter to apply" />
      </div>
    </div>

    <!-- Zoom bar (floating bottom-right) -->
    <div class="zoom-bar">
      <button id="btnZoomOut" class="zbtn" title="Zoom out">−</button>
      <span id="zoomLabel">100%</span>
      <button id="btnZoomIn" class="zbtn" title="Zoom in">+</button>
      <button id="btnZoomReset" class="zbtn" title="Reset zoom" disabled style="font-size:11px">1:1</button>
    </div>
  </div>

  <!-- Right panel: Adjust / Resize / Stamp -->
  <div class="right-panel" id="rightPanel" style="display:none;">
    <div class="rp-tabs">
      <button class="rp-tab active" data-rp-tab="adjust">Adjust</button>
      <button class="rp-tab" data-rp-tab="resize">Resize</button>
      <button class="rp-tab" data-rp-tab="stamp">Stamp</button>
      <button class="rp-close" id="rpClose" title="Close panel">✕</button>
    </div>

    <!-- Adjust tab -->
    <div class="rp-body" id="rpTabAdjust">
      <div class="rp-row">
        <div class="rp-label"><span>Brightness</span><span id="adjBrightnessVal">0</span></div>
        <input type="range" id="adjBrightness" class="rp-slider" min="-100" max="100" value="0">
      </div>
      <div class="rp-row">
        <div class="rp-label"><span>Contrast</span><span id="adjContrastVal">0</span></div>
        <input type="range" id="adjContrast" class="rp-slider" min="-100" max="100" value="0">
      </div>
      <div class="rp-row">
        <div class="rp-label"><span>Saturation</span><span id="adjSaturationVal">0</span></div>
        <input type="range" id="adjSaturation" class="rp-slider" min="-100" max="100" value="0">
      </div>
      <div class="rp-row">
        <div class="rp-label"><span>Sharpness</span><span id="adjSharpnessVal">0</span></div>
        <input type="range" id="adjSharpness" class="rp-slider" min="0" max="10" value="0">
      </div>
      <div class="rp-btn-row">
        <button id="adjReset"  class="rp-btn">↺ Reset</button>
        <button id="adjApply"  class="rp-btn rp-btn-primary">✓ Apply</button>
      </div>
    </div>

    <!-- Resize tab -->
    <div class="rp-body" id="rpTabResize" style="display:none;">
      <div class="rp-row">
        <div class="rp-label"><span>Width</span></div>
        <input type="number" id="rsWidth" class="rp-input-num" min="1" max="8000">
      </div>
      <div class="rp-row">
        <div class="rp-label"><span>Height</span></div>
        <input type="number" id="rsHeight" class="rp-input-num" min="1" max="8000">
      </div>
      <div class="rp-row" style="align-items:center;gap:6px;">
        <label style="display:flex;align-items:center;gap:5px;font-size:11px;cursor:pointer;">
          <input type="checkbox" id="rsLockAR" checked style="cursor:pointer;"> Keep ratio
        </label>
      </div>
      <div class="rp-row">
        <div class="rp-label"><span>Scale</span><span id="rsScaleVal">100%</span></div>
        <input type="range" id="rsScale" class="rp-slider" min="10" max="300" value="100">
      </div>
      <div class="rp-btn-row">
        <button id="rsReset" class="rp-btn">↺ Reset</button>
        <button id="rsApply" class="rp-btn rp-btn-primary">✓ Apply</button>
      </div>
    </div>

    <!-- Stamp tab -->
    <div class="rp-body" id="rpTabStamp" style="display:none;">
      <div class="rp-row">
        <div class="rp-label"><span>Type</span></div>
        <select id="stType" class="rp-select">
          <option value="timestamp">Timestamp</option>
          <option value="custom">Custom text</option>
        </select>
      </div>
      <div id="stCustomRow" class="rp-row" style="display:none;">
        <div class="rp-label"><span>Text</span></div>
        <input type="text" id="stCustomText" class="rp-input-text" placeholder="Your text here">
      </div>
      <div class="rp-row">
        <div class="rp-label"><span>Position</span></div>
        <div class="rp-grid3">
          <button class="rp-pos-btn" data-pos="tl">↖</button>
          <button class="rp-pos-btn" data-pos="tc">↑</button>
          <button class="rp-pos-btn" data-pos="tr">↗</button>
          <button class="rp-pos-btn" data-pos="ml">←</button>
          <button class="rp-pos-btn" data-pos="mc">·</button>
          <button class="rp-pos-btn" data-pos="mr">→</button>
          <button class="rp-pos-btn active" data-pos="bl">↙</button>
          <button class="rp-pos-btn" data-pos="bc">↓</button>
          <button class="rp-pos-btn" data-pos="br">↘</button>
        </div>
      </div>
      <div class="rp-row">
        <div class="rp-label"><span>Font size</span><span id="stFontSizeVal">14px</span></div>
        <input type="range" id="stFontSize" class="rp-slider" min="8" max="48" value="14">
      </div>
      <div class="rp-row">
        <div class="rp-label"><span>Opacity</span><span id="stOpacityVal">80%</span></div>
        <input type="range" id="stOpacity" class="rp-slider" min="10" max="100" value="80">
      </div>
      <div class="rp-btn-row">
        <button id="stApply" class="rp-btn rp-btn-primary" style="width:100%;">✓ Apply Stamp</button>
      </div>
    </div>
  </div>

  <!-- Shortcut panel -->
  <div id="shortcutOverlay">
    <div id="shortcutPanel"></div>
  </div>

  <!-- Confirm Modal -->
  <div id="confirmModal">
    <div class="cm-content">
      <h4 id="cmTitle">Confirm</h4>
      <p id="cmMsg"></p>
      <div class="cm-row">
        <button id="cmCancel">Cancel</button>
        <button id="cmOk">Confirm</button>
      </div>
    </div>
  </div>

  <div id="saveToast"></div>
  <div id="toolToast"></div>
  <script src="editor.js"></script>
</body>
</html>
